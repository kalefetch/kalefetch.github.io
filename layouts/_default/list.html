{{ define "main" }}

<h1>
    Posts
    {{ with .OutputFormats.Get "RSS" }}
    <a href="{{ .RelPermalink }}" class="rss-button">
        <img src="/images/icons/rss.svg" alt="RSS Feed" class="rss-icon">
    </a>
    {{ end }}
</h1>

<ul class="post-list">
    {{ range .Pages }}
    <li>
        <span class="date">{{ .Date.Format "2006-01-02" }}</span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
</ul>

{{ end }}
